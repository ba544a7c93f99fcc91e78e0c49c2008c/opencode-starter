name: Self-test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Install PyYAML
        run: pip install pyyaml --quiet

      - name: Run self-test suite
        run: sh tests/run.sh
